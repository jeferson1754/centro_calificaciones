<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid con iframes - Diseño Mejorado</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .header p {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto;
            color: #666;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-item {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 16px var(--shadow-color);
            background-color: var(--card-background);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
        }

        .grid-item a {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }

        .grid-item iframe, 
        .grid-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Deshabilita la interacción */
            object-fit: cover; /* Para las imágenes */
        }

        .site-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1;
        }

        .grid-item:hover .site-title {
            opacity: 1;
            transform: translateY(0);
        }

        .site-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .site-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .loading-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: shine 1.5s linear infinite;
            border-radius: 12px;
        }

        @keyframes shine {
            to {
                background-position-x: -200%;
            }
        }

        /* Breakpoints para responsividad */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            
            .grid-item {
                padding-top: 65%; /* Ajuste para móviles */
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            body {
                padding: 1rem 0.5rem;
            }
        }

        .last-update {
            font-size: 1rem;
            color: #666;
            margin-top: 0.5rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Calificaciones Generales</h1>
        <p class="last-update" id="fecha-actualizacion">Cargando fecha de actualización...</p>
    </div>

    <div class="grid-container">

        <div class="grid-item">
            <div class="loading-placeholder"></div>
            <a href="https://inventarioncc.infinityfreeapp.com/Anime/Calificaciones/calificaciones.php" target="_blank">
                <img src="https://raw.githubusercontent.com/jeferson1754/capturas-calificaciones/main/Imagenes/anime.jpg" alt="Anime" />
                <div class="site-title">Calificaciones de Anime</div>
            </a>
        </div>
        <div class="grid-item">
            <div class="loading-placeholder"></div>
            <a href="https://inventarioncc.infinityfreeapp.com/Manga/Calificaciones/calificaciones.php" target="_blank">
                <img src="https://raw.githubusercontent.com/jeferson1754/capturas-calificaciones/main/Imagenes/mangas.jpg" alt="Manga" />
                <div class="site-title">Calificaciones de Mangas</div>
            </a>
        </div>
        
        <div class="grid-item">
            <div class="loading-placeholder"></div>
            <a href="https://inventarioncc.infinityfreeapp.com/Series/Calificaciones/calificaciones.php" target="_blank">
                <img src="https://raw.githubusercontent.com/jeferson1754/capturas-calificaciones/main/Imagenes/series.jpg" alt="Series" />
                <div class="site-title">Calificaciones de Series</div>
            </a>
        </div>
        
        
    </div>

    <script>
        const usuarioGithub = 'jeferson1754';
        const repoGithub = 'capturas-calificaciones';

        async function obtenerFechaActualizacion() {
            try {
                // Consultamos la API de GitHub para ver el último commit de la rama principal
                const response = await fetch(`https://api.github.com/repos/${usuarioGithub}/${repoGithub}/commits/main`);
                if (!response.ok) throw new Error('Error al conectar con GitHub');
                
                const data = await response.json();
                const fechaISO = data.commit.committer.date; // Formato: "2026-07-14T12:00:00Z"
                
                // Formateamos la fecha a DD/MM/AAAA
                const fecha = new Date(fechaISO);
                const dia = String(fecha.getDate()).padStart(2, '0');
                const mes = String(fecha.getMonth() + 1).padStart(2, '0');
                const anio = fecha.getFullYear();
                
                document.getElementById('fecha-actualizacion').innerText = `Actualizado el ${dia}/${mes}/${anio}`;
            } catch (error) {
                console.error(error);
                document.getElementById('fecha-actualizacion').innerText = 'Actualizado recientemente';
            }
        }

        obtenerFechaActualizacion();
    </script>
</body>
</html>
